pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{js,jsx,ts,tsx,json}'
      run: bunx oxfmt --check {staged_files}

    lint:
      glob: '*.{js,jsx,ts,tsx}'
      run: bunx oxlint {staged_files}

    types:
      glob: '*.{ts,tsx}'
      run: bun run typecheck

commit-msg:
  parallel: true
  commands:
    commitlint:
      run: bunx commitlint --edit
